# Si nano Factory — local development stack
# docs/DEVELOPMENT_SETUP.md §3
#
# Usage:
#   docker compose up -d           # start all services
#   docker compose ps              # check status
#   docker compose logs -f <svc>   # tail logs
#   docker compose down            # stop (data persists)
#   docker compose down -v         # stop AND wipe volumes (destructive)

name: sinanofactory

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory_dev_password_change_me
      POSTGRES_DB: factory
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factory"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: factory
      MINIO_ROOT_PASSWORD: factory_dev_password_change_me
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 factory factory_dev_password_change_me;
      mc mb -p local/factory-dvc || true;
      mc mb -p local/factory-mlflow || true;
      mc mb -p local/factory-trajectories || true;
      mc anonymous set download local/factory-dvc;
      echo 'MinIO buckets initialised';
      "
    restart: "no"

  prefect-server:
    image: prefecthq/prefect:2.19-python3.11
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
      PREFECT_API_URL: "http://localhost:4200/api"
      PREFECT_UI_URL: "http://localhost:4200"
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://factory:factory_dev_password_change_me@postgres:5432/factory"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - prefect_data:/root/.prefect
    command: prefect server start --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: factory
      AWS_SECRET_ACCESS_KEY: factory_dev_password_change_me
      AWS_REGION: us-east-1
      MLFLOW_BACKEND_STORE_URI: "postgresql+psycopg2://factory:factory_dev_password_change_me@postgres:5432/factory"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "s3://factory-mlflow/"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      bash -c "
      pip install psycopg2-binary boto3 &&
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql+psycopg2://factory:factory_dev_password_change_me@postgres:5432/factory
        --default-artifact-root s3://factory-mlflow/
        --serve-artifacts
      "
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pg_data:
    name: sinanofactory_pg_data
  minio_data:
    name: sinanofactory_minio_data
  prefect_data:
    name: sinanofactory_prefect_data

networks:
  default:
    name: sinanofactory_net
